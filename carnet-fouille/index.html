<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carnet de fouille — Butins de Minecraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@600;700;800&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#202B22;
  --bg-deep:#171F19;
  --bg-panel:#283626;
  --card:#F4ECD8;
  --card-soft:#EFE5CC;
  --ink:#2B2014;
  --ink-soft:#5A4D38;
  --line:#CBB890;
  --line-soft:#DCCB9F;
  --paper-text:#EAE2C8;
  --paper-text-dim:#AFB89E;
  --torch:#DE9F3C;
  --torch-deep:#B97A22;
  --rare:#5FA08E;
  --rare-deep:#3E7E6C;
  --epic:#B5573E;
  --epic-deep:#8E4230;
  --vault:#8C64B0;
  --vault-deep:#6E4B8E;
  --barrel:#8A5A34;
  --dispenser:#5C7C92;
  --suspicious:#C5A02A;
  --equipment:#707866;
  --shadow: 0 6px 18px rgba(0,0,0,.35);
  --radius: 10px;
  --font-display:'Big Shoulders', sans-serif;
  --font-body:'IBM Plex Sans', system-ui, sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(ellipse at 20% -10%, #34452F 0%, transparent 55%),
    radial-gradient(ellipse at 90% 0%, #2C3B27 0%, transparent 45%),
    var(--bg);
  color:var(--paper-text);
  font-family:var(--font-body);
  min-height:100vh;
}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--torch);color:#1b1206;}

/* ---------- layout ---------- */
.app{
  max-width:1320px;
  margin:0 auto;
  padding:18px 18px 64px;
}
.topbar{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  align-items:center;
  margin-bottom:6px;
}
.brand{
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-right:auto;
}
.brand h1{
  font-family:var(--font-display);
  font-weight:800;
  letter-spacing:.5px;
  font-size:clamp(22px,3vw,30px);
  margin:0;
  color:var(--paper-text);
  text-transform:uppercase;
}
.brand .dot{color:var(--torch);}
.brand .sub{
  font-size:12.5px;
  color:var(--paper-text-dim);
  font-family:var(--font-mono);
}
.search-wrap{
  position:relative;
  flex:1 1 280px;
  max-width:420px;
}
.search-wrap input{
  width:100%;
  padding:10px 14px 10px 34px;
  border-radius:999px;
  border:1px solid #46563F;
  background:var(--bg-panel);
  color:var(--paper-text);
  font-size:14px;
  outline:none;
  transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--torch);}
.search-wrap svg{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;color:var(--paper-text-dim);
}
.edition-toggle{
  display:flex;
  background:var(--bg-panel);
  border:1px solid #46563F;
  border-radius:999px;
  padding:3px;
  gap:2px;
}
.edition-toggle button{
  border:none;background:transparent;color:var(--paper-text-dim);
  font-size:13px;font-weight:500;padding:7px 14px;border-radius:999px;
  transition:.15s;
}
.edition-toggle button[aria-pressed="true"]{
  background:var(--torch);color:#1b1206;font-weight:600;
}
.meta-line{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--paper-text-dim);
  margin:2px 0 18px;
}

.layout{
  display:grid;
  grid-template-columns:240px 1fr;
  gap:20px;
  align-items:start;
}
@media (max-width:880px){
  .layout{grid-template-columns:1fr;}
  .sidebar{order:1;}
  .main{order:2;}
}

/* ---------- sidebar ---------- */
.sidebar{
  position:sticky;
  top:18px;
}
.cat-group{margin-bottom:14px;}
.cat-title{
  font-family:var(--font-display);
  font-size:13px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--paper-text-dim);
  margin:0 0 6px 4px;
  font-weight:700;
}
.struct-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;
  text-align:left;
  background:transparent;
  border:1px solid transparent;
  color:var(--paper-text);
  padding:7px 9px;
  border-radius:7px;
  font-size:13.5px;
  margin-bottom:2px;
  transition:.12s;
}
.struct-btn:hover{background:var(--bg-panel);}
.struct-btn[aria-current="true"]{
  background:var(--card);
  color:var(--ink);
  border-color:var(--line);
  font-weight:600;
  box-shadow:var(--shadow);
}
.struct-btn .em{font-size:16px;width:20px;text-align:center;}
@media (max-width:880px){
  .sidebar{
    position:static;
    display:flex;
    overflow-x:auto;
    gap:6px;
    padding-bottom:8px;
    -webkit-overflow-scrolling:touch;
  }
  .sidebar::-webkit-scrollbar{height:5px;}
  .cat-group{display:flex;gap:6px;margin:0;flex:0 0 auto;}
  .cat-title{display:none;}
  .struct-btn{width:auto;white-space:nowrap;flex:0 0 auto;}
}

/* ---------- main / dossier ---------- */
.main{min-width:0;}
.dossier-head{
  background:var(--card);
  color:var(--ink);
  border-radius:var(--radius);
  padding:20px 22px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.dossier-head::before{
  content:"";
  position:absolute;inset:0 0 auto 0;height:5px;
  background:linear-gradient(90deg,var(--torch),var(--rare),var(--epic),var(--vault));
}
.dossier-head h2{
  font-family:var(--font-display);
  font-size:clamp(24px,3.4vw,34px);
  margin:4px 0 4px;
  display:flex;align-items:center;gap:10px;
  text-transform:uppercase;
  letter-spacing:.4px;
}
.cat-badge{
  display:inline-block;
  font-family:var(--font-mono);
  font-size:11px;
  padding:3px 9px;
  border-radius:999px;
  background:var(--bg-deep);
  color:var(--paper-text);
  vertical-align:middle;
  margin-left:6px;
  letter-spacing:.5px;
}
.dossier-intro{
  font-size:14.5px;
  line-height:1.55;
  color:var(--ink-soft);
  max-width:760px;
  margin:6px 0 0;
}
.no-loot-banner{
  margin-top:10px;
  font-size:13.5px;
  background:#E4D6B0;
  border:1px dashed var(--line);
  border-radius:7px;
  padding:9px 12px;
  color:var(--ink);
}

.marginalia{
  margin:14px 0 0;
  padding:0;
  list-style:none;
}
.marginalia li{
  font-size:13px;
  line-height:1.5;
  color:var(--ink-soft);
  background:var(--card-soft);
  border-left:3px dashed var(--line);
  padding:8px 12px;
  margin-bottom:7px;
  border-radius:0 6px 6px 0;
  font-style:italic;
}
.marginalia li::before{content:"✎ ";font-style:normal;opacity:.6;}

.section-label{
  font-family:var(--font-display);
  font-size:14px;
  letter-spacing:1.3px;
  text-transform:uppercase;
  color:var(--paper-text-dim);
  margin:22px 2px 8px;
  font-weight:700;
}

/* ---------- container card ---------- */
.card{
  background:var(--card);
  color:var(--ink);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:14px;
  overflow:hidden;
  scroll-margin-top:14px;
}
.card.flash{animation:flash 1.4s ease;}
@keyframes flash{0%{box-shadow:0 0 0 3px var(--torch), var(--shadow);}100%{box-shadow:var(--shadow);}}
@media (prefers-reduced-motion:reduce){
  .card.flash{animation:none;}
  *{transition-duration:0.01ms !important; animation-duration:0.01ms !important;}
}
.card-head{
  display:flex;align-items:center;gap:9px;flex-wrap:wrap;
  padding:11px 14px;
  border-bottom:1px solid var(--line-soft);
  background:var(--card-soft);
}
.kind-chip{
  display:inline-flex;align-items:center;gap:5px;
  font-family:var(--font-mono);
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  color:#fff;
  white-space:nowrap;
}
.card-head .label{font-weight:600;font-size:14.5px;flex:1 1 auto;}
.edx-tag{
  font-family:var(--font-mono);font-size:10.5px;
  padding:2px 7px;border-radius:5px;
  background:var(--bg-deep);color:var(--paper-text);
}
.diff-btn{
  font-family:var(--font-mono);
  font-size:10.5px;
  border:1px solid var(--epic-deep);
  color:var(--epic-deep);
  background:#F6E6DD;
  padding:3px 8px;border-radius:6px;
}
.diff-btn:hover{background:var(--epic);color:#fff;}
.card-note{
  font-size:12.5px;font-style:italic;color:var(--ink-soft);
  padding:8px 14px 0;
}
.card-body{padding:10px 14px 14px;}

.pool-block{margin-top:10px;}
.pool-meta{
  font-family:var(--font-mono);
  font-size:11px;color:var(--ink-soft);
  margin-bottom:5px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.strata{
  display:flex;height:14px;border-radius:4px;overflow:hidden;
  border:1px solid var(--line);
  margin-bottom:7px;
}
.strata span{height:100%;display:block;}
.strata .t0{background:var(--torch);}
.strata .t1{background:#CBB073;}
.strata .t2{background:var(--rare);}
.strata .t3{background:var(--epic);}
.strata .tempty{background:repeating-linear-gradient(45deg,#d8cba4,#d8cba4 4px,#cabb8c 4px,#cabb8c 8px);}

table.loot-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
table.loot-table th{
  text-align:left;
  font-family:var(--font-mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.4px;
  color:var(--ink-soft);
  padding:3px 6px;
  border-bottom:1px solid var(--line-soft);
}
table.loot-table td{
  padding:4px 6px;
  border-bottom:1px solid #EAE0C2;
  vertical-align:top;
}
table.loot-table tr.empty-row td{color:var(--ink-soft);font-style:italic;}
.item-fr{font-weight:500;}
.item-id{font-family:var(--font-mono);font-size:10.5px;color:#9c8a64;}
.qty,.weight,.chance{font-family:var(--font-mono);font-size:12px;white-space:nowrap;}
.note-cell{font-size:11.5px;color:var(--ink-soft);}
.cond-note{
  font-size:11.5px;font-style:italic;color:var(--epic-deep);margin-bottom:5px;
}

.card-actions{
  display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap;
}
.btn-roll{
  font-family:var(--font-mono);font-size:12px;font-weight:600;
  background:var(--torch);color:#1b1206;border:none;
  padding:7px 13px;border-radius:7px;
}
.btn-roll:hover{background:var(--torch-deep);}
.roll-result{
  font-size:12.5px;
  background:var(--bg-deep);
  color:var(--paper-text);
  border-radius:7px;
  padding:8px 11px;
  font-family:var(--font-mono);
  flex:1 1 220px;
}
.roll-result b{color:var(--torch);}

.compare-wrap{
  margin-top:10px;border-top:2px dashed var(--line);padding-top:10px;
}
.compare-wrap .tag-label{
  font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);margin-bottom:4px;
}

/* ---------- search results ---------- */
.search-summary{
  font-size:13px;color:var(--paper-text-dim);margin:0 2px 10px;
}
.result-group{
  background:var(--card);color:var(--ink);
  border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;box-shadow:var(--shadow);
}
.result-group h3{
  font-family:var(--font-display);font-size:17px;margin:0 0 6px;text-transform:uppercase;
}
.result-row{
  display:flex;justify-content:space-between;align-items:baseline;gap:10px;
  padding:5px 0;border-bottom:1px solid #EAE0C2;font-size:13px;
}
.result-row:last-child{border-bottom:none;}
.result-row a{
  font-family:var(--font-mono);font-size:11.5px;color:var(--rare-deep);text-decoration:none;border-bottom:1px dotted var(--rare-deep);
}
.empty-state{
  text-align:center;color:var(--paper-text-dim);padding:40px 10px;font-size:14px;
}
footer.credits{
  margin-top:36px;text-align:center;font-size:11px;color:var(--paper-text-dim);font-family:var(--font-mono);
  line-height:1.6;
}
footer.credits a{color:var(--torch);text-decoration:none;}
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('loot-data').textContent);

/* ---------------- helpers ---------------- */
function normalize(s){
  return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}
function parseRangeNumbers(str){
  if(str==null) return [1,1];
  const nums = (''+str).match(/-?\d+(\.\d+)?/g);
  if(!nums) return [1,1];
  if(nums.length===1) return [parseFloat(nums[0]), parseFloat(nums[0])];
  return [parseFloat(nums[0]), parseFloat(nums[1])];
}
function randInRange(str){
  const [a,b] = parseRangeNumbers(str);
  const lo = Math.min(a,b), hi = Math.max(a,b);
  return Math.round(lo + Math.random()*(hi-lo));
}
function escapeHtml(s){
  return (s==null?'':''+s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

const CATEGORY_ORDER = ["Surface","Aquatique","Nether","End","Souterrain","Spécial"];
const CATEGORY_META = {
  "Surface":"🌳", "Aquatique":"🌊", "Nether":"🔥", "End":"🌌", "Souterrain":"⛏️", "Spécial":"🎁"
};
const KIND_META = {
  chest:        {label:"Coffre",            color:"var(--torch-deep)", icon:"📦"},
  barrel:       {label:"Tonneau",           color:"var(--barrel)",     icon:"🛢️"},
  pot:          {label:"Pot décoré",        color:"var(--epic)",       icon:"🏺"},
  dispenser:    {label:"Distributeur",      color:"var(--dispenser)",  icon:"🎯"},
  vault:        {label:"Voûte",             color:"var(--vault)",      icon:"🗝️"},
  minecart_chest:{label:"Wagonnet-coffre",  color:"var(--epic-deep)",  icon:"🛤️"},
  equipment:    {label:"Équipement (mob)",  color:"var(--equipment)",  icon:"🛡️"},
  suspicious_sand:{label:"Bloc suspect",    color:"#8C6E1E",           icon:"🧹"},
};

/* ---------------- state ---------------- */
const state = {
  edition: 'java',
  selectedId: DATA.structures[0] ? DATA.structures[0].id : null,
  query: '',
};

/* ---------------- search index ---------------- */
const searchIndex = [];
DATA.structures.forEach(s=>{
  [...s.containers, ...s.archaeology].forEach(c=>{
    ['java','bedrock'].forEach(ed=>{
      const table = c[ed];
      if(!table) return;
      table.pools.forEach(pool=>{
        pool.entries.forEach(e=>{
          if(!e.item) return;
          searchIndex.push({
            structureId:s.id, structureName:s.name, emoji:s.emoji,
            containerId:c.id, containerLabel:c.label, kind:c.kind,
            edition:ed, item:e.item, item_fr:e.item_fr || e.item, count:e.count, weight:e.weight,
          });
        });
      });
    });
  });
});

/* secondary index: container kind / label (so "tonneau", "voûte", "sable suspect" etc. resolve) */
const containerIndex = [];
DATA.structures.forEach(s=>{
  [...s.containers, ...s.archaeology].forEach(c=>{
    const km = KIND_META[c.kind] || {label:c.kind};
    containerIndex.push({
      structureId:s.id, structureName:s.name, emoji:s.emoji,
      containerId:c.id, containerLabel:c.label, kind:c.kind, kindLabel:km.label,
    });
  });
});

/* tertiary index: structure curiosities / intro text (covers non-loot "objets intéressants" like
   the sponge room, the elytra frame, etc. which are not driven by a loot table at all) */
const curiosityIndex = [];
DATA.structures.forEach(s=>{
  (s.curiosities||[]).forEach(text=>{
    curiosityIndex.push({structureId:s.id, structureName:s.name, emoji:s.emoji, text});
  });
  if(s.intro) curiosityIndex.push({structureId:s.id, structureName:s.name, emoji:s.emoji, text:s.intro});
});

function highlightSnippet(text, q){
  const norm = normalize(text);
  const idx = norm.indexOf(q);
  if(idx<0) return escapeHtml(text);
  const start = Math.max(0, idx-40);
  const end = Math.min(text.length, idx+q.length+60);
  let snip = (start>0?'…':'') + text.slice(start,end) + (end<text.length?'…':'');
  // re-find within snip for highlighting (approximate, case/accent-insensitive)
  const snipNorm = normalize(snip);
  const i2 = snipNorm.indexOf(q);
  if(i2<0) return escapeHtml(snip);
  return escapeHtml(snip.slice(0,i2)) + '<mark style="background:var(--torch);color:#1b1206;border-radius:3px;">' + escapeHtml(snip.slice(i2,i2+q.length)) + '</mark>' + escapeHtml(snip.slice(i2+q.length));
}
function tableSignature(table){
  if(!table) return null;
  return table.pools.map(pool=>{
    const entries = pool.entries.map(e=> `${e.item}|${e.weight||1}|${e.count||''}`).sort().join(',');
    return `${pool.rolls}::${entries}`;
  }).sort().join('||');
}
function containersDiffer(c){
  if(!c.java || !c.bedrock) return false; // exclusivity handled separately
  return tableSignature(c.java) !== tableSignature(c.bedrock);
}

/* ---------------- simulate a roll ---------------- */
function simulateTable(table){
  const results = {};
  table.pools.forEach(pool=>{
    let rolls = Math.max(0, Math.round(randInRange(pool.rolls)));
    for(let i=0;i<rolls;i++){
      const weighted = pool.entries.map(e=>({e, w: (e.weight==null?1:e.weight)}));
      const total = weighted.reduce((a,x)=>a+x.w,0);
      if(total<=0) continue;
      let r = Math.random()*total;
      let picked = weighted[weighted.length-1].e;
      for(const x of weighted){ if(r<x.w){picked=x.e; break;} r-=x.w; }
      if(!picked.item) continue;
      const qty = picked.count ? Math.max(1,randInRange(picked.count)) : 1;
      const key = picked.item_fr || picked.item;
      results[key] = (results[key]||0)+qty;
    }
  });
  return results;
}

/* ---------------- rendering: sidebar ---------------- */
function renderSidebar(){
  const el = document.getElementById('sidebar');
  el.innerHTML = '';
  CATEGORY_ORDER.forEach(cat=>{
    const list = DATA.structures.filter(s=>s.category===cat);
    if(!list.length) return;
    const group = document.createElement('div');
    group.className = 'cat-group';
    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = `${CATEGORY_META[cat]||''} ${cat}`;
    group.appendChild(title);
    list.forEach(s=>{
      const btn = document.createElement('button');
      btn.className = 'struct-btn';
      btn.setAttribute('aria-current', state.selectedId===s.id ? 'true':'false');
      btn.innerHTML = `<span class="em">${s.emoji}</span><span>${escapeHtml(s.name)}</span>`;
      btn.addEventListener('click', ()=>{
        state.selectedId = s.id;
        state.query='';
        document.getElementById('searchInput').value='';
        renderAll();
        window.scrollTo({top:0, behavior:'smooth'});
      });
      group.appendChild(btn);
    });
    el.appendChild(group);
  });
}

/* ---------------- rendering: a container card ---------------- */
function renderPool(pool){
  const total = pool.entries.reduce((a,e)=>a+(e.weight==null?1:e.weight),0) || 1;
  const sorted = [...pool.entries].sort((a,b)=>(b.weight||1)-(a.weight||1));
  const n = sorted.length;
  const strata = sorted.map((e,i)=>{
    const w = e.weight==null?1:e.weight;
    const pct = (w/total*100).toFixed(2);
    const cls = !e.item ? 'tempty' : ['t0','t1','t2','t3'][Math.min(3, Math.floor(i/Math.max(1,n/4)))];
    const titleName = e.item ? (e.item_fr||e.item) : 'Rien';
    return `<span class="${cls}" style="width:${pct}%" title="${escapeHtml(titleName)} — ${pct}%"></span>`;
  }).join('');

  const rows = pool.entries.map(e=>{
    const chance = ((e.weight==null?1:e.weight)/total*100).toFixed(1)+'%';
    if(!e.item){
      return `<tr class="empty-row"><td colspan="3">— Rien (tirage vide) —</td><td class="chance">${chance}</td><td class="note-cell"></td></tr>`;
    }
    const name = e.item.startsWith('#') ? e.item : (e.item_fr || e.item);
    return `<tr>
      <td><div class="item-fr">${escapeHtml(name)}</div><div class="item-id">${escapeHtml(e.item)}</div></td>
      <td class="qty">${e.count?escapeHtml(e.count):'1'}</td>
      <td class="weight">${e.weight==null?1:e.weight}</td>
      <td class="chance">${chance}</td>
      <td class="note-cell">${e.note?escapeHtml(e.note):''}</td>
    </tr>`;
  }).join('');

  const metaBits = [`Tirages : <b>${escapeHtml(pool.rolls)}</b>`];
  if(pool.bonus_rolls) metaBits.push(`+ bonus (Fortune) : ${escapeHtml(pool.bonus_rolls)}`);

  return `
    <div class="pool-block">
      <div class="pool-meta">${metaBits.join(' &nbsp;·&nbsp; ')}</div>
      ${pool.condition?`<div class="cond-note">⚠ ${escapeHtml(pool.condition)}</div>`:''}
      <div class="strata">${strata}</div>
      <table class="loot-table">
        <thead><tr><th>Objet</th><th>Quantité</th><th>Poids</th><th>Chance/tirage</th><th>Note</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function renderTableBlock(table){
  return table.pools.map(renderPool).join('');
}

let cardCounter = 0;
function renderContainerCard(c, isArchaeology){
  cardCounter++;
  const cardId = `card-${c.id}-${cardCounter}`;
  const km = KIND_META[c.kind] || {label:c.kind, color:'#888', icon:'•'};
  const primaryEd = state.edition;
  const otherEd = primaryEd==='java' ? 'bedrock' : 'java';
  const primary = c[primaryEd];
  const other = c[otherEd];

  let exclusiveNote = '';
  if(!primary && other){
    exclusiveNote = `<div class="card-note">N'existe pas en édition ${primaryEd==='java'?'Java':'Bedrock'}${c.note?` — ${escapeHtml(c.note)}`:''}. Affichage de la version ${otherEd==='java'?'Java':'Bedrock'} ci-dessous.</div>`;
  }
  const showTable = primary || other;
  const tableToShow = primary || other;
  const diff = containersDiffer(c);

  let actionsHtml = '';
  if(showTable){
    actionsHtml = `
      <div class="card-actions">
        <button class="btn-roll" data-roll-for="${cardId}">🎲 Simuler un tirage</button>
        <div class="roll-result" id="${cardId}-result" style="display:none;"></div>
      </div>`;
  }

  let compareHtml = '';
  if(diff){
    compareHtml = `
      <div class="compare-wrap" id="${cardId}-compare" hidden>
        <div class="tag-label">Version ${otherEd==='java'?'Java':'Bedrock'} :</div>
        ${renderTableBlock(other)}
      </div>`;
  }

  return `
    <div class="card" id="${cardId}">
      <div class="card-head">
        <span class="kind-chip" style="background:${km.color}">${km.icon} ${km.label}</span>
        <span class="label">${escapeHtml(c.label)}</span>
        ${!other && primary ? `<span class="edx-tag">${primaryEd==='java'?'Java':'Bedrock'} seulement</span>`:''}
        ${diff ? `<button class="diff-btn" data-toggle-compare="${cardId}-compare">⚡ Diffère sur ${otherEd==='java'?'Java':'Bedrock'}</button>`:''}
      </div>
      ${c.note ? `<div class="card-note">${escapeHtml(c.note)}</div>`:''}
      ${exclusiveNote}
      <div class="card-body">
        ${showTable ? renderTableBlock(tableToShow) : '<div class="card-note">Aucune donnée disponible.</div>'}
        ${actionsHtml}
        ${compareHtml}
      </div>
    </div>`;
}

/* ---------------- rendering: structure dossier ---------------- */
function renderDossier(s){
  const hasAnyLoot = s.containers.length>0 || s.archaeology.length>0;
  let html = `
    <div class="dossier-head">
      <h2>${s.emoji} ${escapeHtml(s.name)}<span class="cat-badge">${CATEGORY_META[s.category]||''} ${escapeHtml(s.category)}</span></h2>
      <p class="dossier-intro">${escapeHtml(s.intro)}</p>
      ${!hasAnyLoot ? `<div class="no-loot-banner">Aucun coffre ni bloc suspect dans cette structure — voir les curiosités ci-dessous.</div>`:''}
      ${s.curiosities && s.curiosities.length ? `<ul class="marginalia">${s.curiosities.map(t=>`<li>${escapeHtml(t)}</li>`).join('')}</ul>` : ''}
    </div>`;

  if(s.containers.length){
    html += `<div class="section-label">Contenants</div>`;
    html += s.containers.map(c=>renderContainerCard(c,false)).join('');
  }
  if(s.archaeology.length){
    html += `<div class="section-label">Sable / gravier suspect (archéologie)</div>`;
    html += s.archaeology.map(c=>renderContainerCard(c,true)).join('');
  }
  return html;
}

/* ---------------- rendering: search results ---------------- */
function renderSearch(query){
  const q = normalize(query);
  if(!q) return '';

  const itemMatches = searchIndex.filter(r => r.edition===state.edition && (normalize(r.item_fr).includes(q) || normalize(r.item).includes(q)));
  const kindMatches = containerIndex.filter(r => normalize(r.kindLabel).includes(q) || normalize(r.containerLabel).includes(q));
  const curioMatches = curiosityIndex.filter(r => normalize(r.text).includes(q));

  const totalCount = itemMatches.length + kindMatches.length + curioMatches.length;
  if(totalCount===0){
    return `<div class="search-summary">0 résultat pour « ${escapeHtml(query)} » (édition ${state.edition==='java'?'Java':'Bedrock'}).</div>
            <div class="empty-state">Rien trouvé. Essayez l'autre édition, un terme plus court, ou un type de contenant (« tonneau », « voûte », « pot »).</div>`;
  }

  let html = `<div class="search-summary">${totalCount} résultat(s) pour « ${escapeHtml(query)} » — édition ${state.edition==='java'?'Java':'Bedrock'}.</div>`;

  if(itemMatches.length){
    html += `<div class="section-label">Objets trouvés dans des contenants</div>`;
    const byStructure = {};
    itemMatches.forEach(m=>{
      byStructure[m.structureId] = byStructure[m.structureId] || {name:m.structureName, emoji:m.emoji, rows:[]};
      byStructure[m.structureId].rows.push(m);
    });
    Object.keys(byStructure).forEach(sid=>{
      const grp = byStructure[sid];
      html += `<div class="result-group"><h3>${grp.emoji} ${escapeHtml(grp.name)}</h3>`;
      const seen = new Set();
      grp.rows.forEach(r=>{
        const k = r.containerId+r.item;
        if(seen.has(k)) return; seen.add(k);
        const km = KIND_META[r.kind]||{label:r.kind,icon:'•'};
        html += `<div class="result-row">
          <span>${km.icon} <b>${escapeHtml(r.item_fr)}</b> — ${escapeHtml(r.containerLabel)}</span>
          <a href="#" data-goto="${sid}" data-goto-card="${r.containerId}">Voir →</a>
        </div>`;
      });
      html += `</div>`;
    });
  }

  if(kindMatches.length){
    html += `<div class="section-label">Contenants / blocs correspondants</div><div class="result-group">`;
    const seen = new Set();
    kindMatches.forEach(r=>{
      const k = r.structureId+r.containerId;
      if(seen.has(k)) return; seen.add(k);
      const km = KIND_META[r.kind]||{label:r.kind,icon:'•'};
      html += `<div class="result-row">
        <span>${r.emoji} ${km.icon} <b>${escapeHtml(r.containerLabel)}</b> — ${escapeHtml(r.structureName)}</span>
        <a href="#" data-goto="${r.structureId}" data-goto-card="${r.containerId}">Voir →</a>
      </div>`;
    });
    html += `</div>`;
  }

  if(curioMatches.length){
    html += `<div class="section-label">Mentionné dans les particularités d'une structure</div><div class="result-group">`;
    const seen = new Set();
    curioMatches.forEach(r=>{
      const k = r.structureId+r.text.slice(0,20);
      if(seen.has(k)) return; seen.add(k);
      html += `<div class="result-row" style="display:block;">
        <div style="margin-bottom:3px;">${r.emoji} <b>${escapeHtml(r.structureName)}</b> — <a href="#" data-goto="${r.structureId}">Voir →</a></div>
        <div style="font-size:12.5px;color:var(--ink-soft);font-style:italic;">${highlightSnippet(r.text, q)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  return html;
}

/* ---------------- master render ---------------- */
function renderAll(){
  document.getElementById('metaLine').textContent =
    `${DATA.structures.length} structures · éd. Java ${DATA.meta.java_version.split(' ')[0]} & Bedrock ${DATA.meta.bedrock_version.split(' ')[0]}`;
  document.getElementById('btnJava').setAttribute('aria-pressed', state.edition==='java');
  document.getElementById('btnBedrock').setAttribute('aria-pressed', state.edition==='bedrock');
  renderSidebar();
  const main = document.getElementById('main');
  if(state.query.trim().length>0){
    main.innerHTML = renderSearch(state.query.trim());
    main.querySelectorAll('[data-goto]').forEach(a=>{
      a.addEventListener('click', (ev)=>{
        ev.preventDefault();
        state.selectedId = a.getAttribute('data-goto');
        state.query='';
        document.getElementById('searchInput').value='';
        renderAll();
        const target = a.getAttribute('data-goto-card');
        setTimeout(()=>{
          const cards = [...document.querySelectorAll(`[id^="card-${target}-"]`)];
          if(cards[0]){
            cards[0].scrollIntoView({behavior:'smooth', block:'center'});
            cards[0].classList.add('flash');
            setTimeout(()=>cards[0].classList.remove('flash'), 1500);
          }
        }, 30);
      });
    });
  } else {
    const s = DATA.structures.find(s=>s.id===state.selectedId) || DATA.structures[0];
    main.innerHTML = s ? renderDossier(s) : '<div class="empty-state">Sélectionnez une structure.</div>';
    main.querySelectorAll('[data-roll-for]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const cardId = btn.getAttribute('data-roll-for');
        const card = document.getElementById(cardId);
        const cId = cardId.split('-').slice(1,-1).join('-');
        // find container data again
        let containerData=null;
        for(const st of DATA.structures){
          containerData = [...st.containers, ...st.archaeology].find(c=>c.id===cId);
          if(containerData) break;
        }
        const table = containerData[state.edition] || containerData[state.edition==='java'?'bedrock':'java'];
        const res = simulateTable(table);
        const box = document.getElementById(cardId+'-result');
        const entries = Object.entries(res);
        box.style.display='block';
        box.innerHTML = entries.length
          ? entries.map(([k,v])=>`<b>${v}×</b> ${escapeHtml(k)}`).join(' &nbsp;·&nbsp; ')
          : '<i>Rien obtenu sur ce tirage.</i>';
      });
    });
    main.querySelectorAll('[data-toggle-compare]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const target = document.getElementById(btn.getAttribute('data-toggle-compare'));
        target.hidden = !target.hidden;
      });
    });
  }
}

document.getElementById('btnJava').addEventListener('click', ()=>{state.edition='java'; renderAll();});
document.getElementById('btnBedrock').addEventListener('click', ()=>{state.edition='bedrock'; renderAll();});
let searchTimer=null;
document.getElementById('searchInput').addEventListener('input', (e)=>{
  state.query = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderAll, 90);
});

renderAll();
</script>
